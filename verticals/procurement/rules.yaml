  - 내용증명 발송 (지급/손해배상 청구 근거 명시)
  - 계약서 + 납품확인서 원본 확보
  - 법무팀 검토 후 소송 준비
  moderate_plaintiff_advantage:
  - 공급업체 공식 서면 통보
  - 분쟁조정위원회 신청 검토
  - 계약 조건 재협상 시도
  neutral:
