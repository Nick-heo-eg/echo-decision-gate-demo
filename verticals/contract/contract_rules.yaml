# Contract Gate Rule Templates
# version: 1.0
# 구조: contract_type → clauses → rules → gate decision
#
# 확장 방법:
#   1. 새 contract_type 블록 추가
#   2. clauses에 조항 번호 + 조건 정의
#   3. gate_action: HOLD | REDIRECT | ALLOW
#   코드 수정 없음 — 이 파일만 수정
#
# clause 조건 필드:
#   field:      케이스에서 읽을 값
#   operator:   eq / gt / lt / exists / not_exists / contains
#   value:      비교 대상
#   gate_action: 조건 충족 시 결정
#   owner:      HOLD=submitter / REDIRECT=지정 팀
#   financial_impact_formula: 금액 계산식 (선택)

version: "1.0"
domain: contract

# ── 1. 납품 지연 + 패널티 ─────────────────────────────────────────────────────
contract_types:

  delivery_penalty:
    label: "납품 지연 패널티"
    description: "계약서에 패널티 조항이 있는 납품 지연"
    triggers:
      - dispute_type: delivery_delay
    clauses:
      - id: "DEL-001"
        label: "패널티 조항"
        template: "Delay beyond {threshold_days} days incurs {penalty_rate}/day. No cap."
        rules:
          - id: "DEL-PENALTY-ACTIVE"
            condition:
              field: penalty_clause
              operator: eq
              value: true
            and_condition:
              field: delivery_delay_days
              operator: gt
              value: "{threshold_days}"
            gate_action: HOLD
            owner: submitter
            reason: "패널티 조항 활성 — 수락 전 waiver 또는 크레딧 확보 필요"
            financial_impact_formula: "(delivery_delay_days - threshold_days) * penalty_rate"
            fix_required: waiver_or_credit
            route_to: legal

      - id: "DEL-002"
        label: "Waiver 조항"
        template: "Penalty waiver requires written approval from both parties prior to acceptance."
        rules:
          - id: "DEL-WAIVER-MISSING"
            condition:
              field: waiver_obtained
              operator: eq
              value: false
            gate_action: HOLD
            owner: submitter
            reason: "서면 waiver 없음 — 수락 시 패널티 청구권 소멸"
            fix_required: obtain_written_waiver
            route_to: legal

      - id: "DEL-003"
        label: "부분 납품 조항"
        template: "Partial delivery does not constitute acceptance. Full SLA applies."
        rules:
          - id: "DEL-PARTIAL-SLA"
            condition:
              field: partial_delivery_offered
              operator: eq
              value: true
            gate_action: HOLD
            owner: submitter
            reason: "부분 납품 수락 ≠ 납품 완료 — SLA 시계 계속 작동"
            fix_required: conditional_acceptance_language

  # ── 2. 미지급 / 지급 분쟁 ───────────────────────────────────────────────────
  payment_default:
    label: "미지급 / 계약 위반"
    description: "인보이스 미지급 및 계약 위반 처리"
    triggers:
      - dispute_type: payment
    clauses:
      - id: "PAY-001"
        label: "지급 조건"
        template: "Net-{net_days} from invoice date. Late payment accrues {late_rate}%/month."
        rules:
          - id: "PAY-OVERDUE-CLAIM"
            condition:
              field: payment_overdue
              operator: eq
              value: true
            and_condition:
              field: contract_active
              operator: eq
              value: true
            gate_action: ALLOW
            owner: submitter
            reason: "계약 유효 + 연체 확인 — 청구 근거 명확"
            next_action: issue_demand_letter

      - id: "PAY-002"
        label: "계약 위반 조항"
        template: "Failure to pay within {breach_days} days constitutes material breach."
        rules:
          - id: "PAY-MATERIAL-BREACH"
            condition:
              field: overdue_days
              operator: gt
              value: "{breach_days}"
            gate_action: ALLOW
            owner: submitter
            reason: "중대한 계약 위반 — 납품 중단 및 법적 회수 가능"
            next_action: suspend_delivery_and_recover

  # ── 3. 계약 해지 (Termination) ───────────────────────────────────────────────
  termination:
    label: "계약 해지"
    description: "일방적 해지, 위반에 의한 해지, 해지 통보 기간"
    triggers:
      - dispute_type: termination
    clauses:
      - id: "TERM-001"
        label: "해지 통보 기간"
        template: "Either party may terminate with {notice_days} days written notice."
        rules:
          - id: "TERM-NOTICE-MISSING"
            condition:
              field: notice_given_days
              operator: lt
              value: "{notice_days}"
            gate_action: HOLD
            owner: submitter
            reason: "해지 통보 기간 미충족 — 즉시 해지 시 손해배상 청구 노출"
            fix_required: extend_notice_period
            route_to: legal

      - id: "TERM-002"
        label: "위반에 의한 해지"
        template: "Material breach allows immediate termination without notice."
        rules:
          - id: "TERM-BREACH-VERIFY"
            condition:
              field: material_breach_confirmed
              operator: eq
              value: false
            gate_action: REDIRECT
            owner: legal
            reason: "중대한 계약 위반 미확인 — 즉시 해지 전 법무 확인 필수"
            route_to: legal

  # ── 4. 책임 상한 (Liability Cap) ─────────────────────────────────────────────
  liability_cap:
    label: "책임 상한 초과"
    description: "계약 책임 상한을 초과하는 청구 또는 합의"
    triggers:
      - dispute_type: liability
    clauses:
      - id: "LIAB-001"
        label: "책임 상한 조항"
        template: "Total liability shall not exceed {cap_amount} (contract value)."
        rules:
          - id: "LIAB-CAP-EXCEEDED"
            condition:
              field: claim_amount
              operator: gt
              value: "{cap_amount}"
            gate_action: REDIRECT
            owner: legal
            reason: "청구액이 계약 책임 상한 초과 — 법무 없이 합의 불가"
            route_to: legal

          - id: "LIAB-WAIVER-RISK"
            condition:
              field: waiver_language_in_draft
              operator: eq
              value: true
            gate_action: HOLD
            owner: submitter
            reason: "초안에 권리 포기 표현 포함 — 책임 상한 무력화 위험"
            fix_required: remove_waiver_language

  # ── 5. 독점 공급 위반 (Exclusivity) ──────────────────────────────────────────
  exclusivity:
    label: "독점 공급 위반"
    description: "독점 공급 또는 독점 구매 조항 위반"
    triggers:
      - dispute_type: exclusivity
    clauses:
      - id: "EXCL-001"
        label: "독점 공급 조항"
        template: "Supplier shall not supply {product_category} to competitors during contract term."
        rules:
          - id: "EXCL-COMPETITOR-SUPPLY"
            condition:
              field: competitor_supply_detected
              operator: eq
              value: true
            gate_action: REDIRECT
            owner: legal
            reason: "독점 조항 위반 의심 — 법무 검토 및 증거 확보 필수"
            route_to: legal

  # ── 6. 불가항력 (Force Majeure) ──────────────────────────────────────────────
  force_majeure:
    label: "불가항력"
    description: "불가항력 사유로 인한 의무 면제 또는 계약 중단"
    triggers:
      - dispute_type: force_majeure
    clauses:
      - id: "FM-001"
        label: "불가항력 조항"
        template: "Neither party liable for delays caused by events beyond reasonable control."
        rules:
          - id: "FM-NOTICE-REQUIRED"
            condition:
              field: fm_notice_given
              operator: eq
              value: false
            gate_action: HOLD
            owner: submitter
            reason: "불가항력 통보 미발송 — 조항 적용을 위해 즉시 서면 통보 필요"
            fix_required: send_fm_notice

          - id: "FM-SCOPE-VERIFY"
            condition:
              field: fm_event_in_clause
              operator: eq
              value: false
            gate_action: REDIRECT
            owner: legal
            reason: "해당 사유가 불가항력 조항 범위 내인지 불명확 — 법무 확인 필수"
            route_to: legal

# ── gate decision 매핑 ────────────────────────────────────────────────────────
gate_decisions:
  ALLOW:
    execution_locked: false
    label: "진행 가능"
    color: "#1b5e20"
  HOLD:
    execution_locked: true
    label: "진행 불가 — 제출자가 해소"
    color: "#b71c1c"
  REDIRECT:
    execution_locked: true
    label: "진행 불가 — 담당자에게 이관"
    color: "#4a148c"

# ── owner 매핑 ────────────────────────────────────────────────────────────────
owners:
  submitter:
    label: "제출자"
    action: "Fix it — 직접 수정"
  legal:
    label: "법무팀"
    action: "Route — 법무팀 검토 요청"
  engineering:
    label: "개발팀"
    action: "Route — 개발팀 서명 요청"
  management:
    label: "경영진"
    action: "Route — 승인 요청"
