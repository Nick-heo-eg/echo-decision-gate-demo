# Execution Blueprint v1.0 — 4M 변경 표준 실행 패키지
# 확정일: 2026-04-21
# 목적: 매번 회의로 재정의하는 검증 scope를 자동 생성
# 원칙: 숫자는 조정 가능 (note: adjustable 표시), 항목은 현업 기준 고정
#
# comp_type별 신뢰성 override는 reliability.by_comp_type 참조

M1_material:
  trigger: 부품 변경 (신규 협력사 또는 대체품)
  validation:
    unit_sample:
      count: 10          # note: adjustable (내부 단품검사용)
      tests:
        - 전기 특성 (electrical characteristics)
        - 핀 호환성 확인 (pin compatibility)   # ← 개발 서명 필수 (INC-001)
        - 핀맵 데이터시트 대조 — 개발팀 직접 확인  # ← INC-001 추가 (2026-04-22)
        - 외관 검사 (visual inspection)
        - 치수 검사 (dimensional check)
      sign_off_required:
        - role: Development
          item: "핀맵 데이터시트 대조 확인"
          mandatory: true
          note: "구매/품질 서명으로 대체 불가 — INC-001 근거"
    reliability:
      count: 10          # note: adjustable (신뢰성 시험용 별도)
      tests:
        - 습도 테스트 (humidity test)
        - 고온 테스트 (high temp)
        - 저온 테스트 (low temp)
        - 진동 테스트 (vibration test)
      note: comp_type별 추가 항목은 아래 by_comp_type 참조
    product_sample:
      count_range: [10, 30]    # note: adjustable (고객마다 다름)
      note: 고객사별 요구 수량 별도 확인 필수
  eco:
    documents:
      - RoHS 성적서
      - REACH SVHC 확인서
    note: 고객사 요구 시 추가 (halogen-free 등)
  customer:
    pcn_required: conditional    # supplier_new=true 또는 customer_required=true
    lead_time_days: 60           # note: adjustable (고객사마다 다름)
    pcn_type: PCN
  internal_approval:
    - 단품 검사 (SQE/OQA)
    - 신뢰성 완료 (REL)
    - 개발 승인 (DEV)
    - 친환경 승인 (ENV)

M2_method:
  trigger: 공정 방법/조건 변경
  validation:
    process:
      tests:
        - 공정 Capability 확인 (Cpk)
        - 내부 테스트 (양산 조건 동일 적용)
        - 품질 검증 (Quality sign-off)
    customer_impact:
      assessment_required: true
      note: 영향 없음 확인 시 고객 신고 면제 가능
  customer:
    pcn_required: conditional    # process_add / process_seq_change / process_fundamental_change
    lead_time_days: 30           # note: adjustable
    trigger_conditions:
      - 공정 추가
      - 공정 순서 변경
      - 공정 방식 근본 변경 (자동화 등)
      - 고객 영향 불명확
  internal_approval:
    - 공정 검증 (Manufacturing)
    - 품질 sign-off (SQE/OQA)

M3_machine:
  trigger: 설비/장비 변경
  validation:
    qualification:
      - IQ (Installation Qualification)
      - OQ (Operational Qualification)
      - PQ (Process Qualification)    # 필수 — 없으면 HOLD
    sqe_signoff: required
  customer:
    pcn_required: conditional    # thermal profile 등 공정 영향 있는 설비
    lead_time_days: 30           # note: adjustable
    note: AOI 등 검사 장비는 고객 사전 합의로 면제 가능
  internal_approval:
    - SQE sign-off
    - Manufacturing 승인

M4_man:
  trigger: 작업자 변경/신규 투입
  validation:
    training:
      - 라인 OJT 완료 (필수 — 없으면 HOLD, 경력 무관)
    certification:
      - 자격증 보유 → ALLOW
      - 자격증 없음 → CONDITIONAL_ALLOW (감독 하 투입)
  customer:
    pcn_required: false    # M4는 고객 신고 대상 아님
  internal_approval:
    - 라인 책임자 확인
    - Manufacturing 승인

M5_design:
  trigger: 설계 변경 (회로/PCB/BOM)
  validation:
    unit_sample:
      count: 10            # note: adjustable
      tests:
        - 기능 검증 (functional test)
        - 전기 특성 (electrical characteristics)
    reliability:
      count: 10            # note: adjustable
      tests:
        - 습도 테스트
        - 고온/저온 테스트
        - 진동 테스트
      note: PENDING — layout-only 케이스 면제 여부 미확정 (M5 케이스 ≥5건 후)
    product_sample:
      count_range: [10, 30]    # note: adjustable
  eco:
    documents:
      - RoHS 성적서
      - REACH SVHC 확인서
  customer:
    pcn_required: true     # M5는 무조건 고객 신고 의무
    lead_time_days: 60     # note: adjustable
    pcn_type: ECN          # Engineering Change Notice
  internal_approval:
    - 개발 승인 (DEV) — 필수
    - 신뢰성 완료 (REL)
    - 품질 sign-off (SQE/OQA)

M6_supplier:
  trigger: 공급사 변경 (dual source 포함)
  validation:
    sqe_audit:
      required: true       # 고객 승인과 무관하게 필수
      items:
        - 공급사 현장 심사
        - 품질 시스템 확인 (ISO 9001 등)
        - 생산 능력 확인
    reliability:
      count: 10            # note: adjustable
      tests:
        - 습도 테스트
        - 고온/저온 테스트
        - 진동 테스트
      note: 동일 칩 dual source여도 신규 공급원이면 필수
    unit_sample:
      count: 10            # note: adjustable
  eco:
    documents:
      - RoHS 성적서
      - REACH SVHC 확인서
  customer:
    pcn_required: conditional    # supplier_new=true
    lead_time_days: 60           # note: adjustable
    pcn_type: PCN
  internal_approval:
    - SQE 심사 완료
    - 개발 승인 (DEV)
    - 신뢰성 완료 (REL)

# ── comp_type별 신뢰성 추가 항목 ─────────────────────────────────────────────
reliability:
  by_comp_type:
    trigger:
      add:
        - HTOL (High Temperature Operating Life)
        - ESD 내성 시험
    sensing:
      add:
        - HTOL
        - TC (Thermal Cycling)
    protection:
      add:
        - ESD 내성 시험
        - surge 내성 시험
    logic:
      add:
        - HTOL
        - TC
    passive:
      note: 기본 3종 (습도/온도/진동)으로 충분한 경우 많음. SQE 판단.
