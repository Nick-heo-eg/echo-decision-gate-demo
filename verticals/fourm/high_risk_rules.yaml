version: "1.1"
name: "4M HIGH RISK 판정 규칙"
description: |
  HIGH RISK = 이 조건 중 하나라도 해당 시 사유 입력 강제 + gate REDIRECT_DEV 우선.
  조직 규칙으로 고정. 코드가 아닌 이 파일이 SSOT.

# ── 사고 이력 ──────────────────────────────────────────────────────────────────
incident_log:
  - id: INC-001
    date: "2026-04-22"
    case: "Rohm IC 대체품 핀맵 불일치 — LGES 검증 NG"
    loss: "약 2천만원 (재작업비)"
    root_cause: >
      M1 대체품 적용 시 핀맵 검증을 개발팀이 수행하지 않음.
      구매 담당자가 전화 확인 후 '확인함' 기재했으나 서면 근거 없음.
      4M 체크리스트에 개발 서명 강제 항목 없었음.
    resolution: >
      HR-009 추가: M1 대체품 + 핀맵 미확인 시 REDIRECT_DEV 강제.
      execution_blueprint M1 unit_sample에 개발 서명 필수 항목 추가.
    cost_attribution:
      개발: 35%
      구매: 35%
      프로세스: 25%
      품질: 5%
      final_decision: "개발 부담 (회의 결정 2026-04-22)"

rules:
  - id: HR-001
    condition: "pin_map_changed == YES"
    reason: "핀 변경은 HW 회로 영향 → 개발 검증 필수"

  - id: HR-002
    condition: "functional_change == YES"
    reason: "기능 변경은 제품 스펙 영향 → 개발 검증 필수"

  - id: HR-003
    condition: "component_type in [trigger, sensing, protection]"
    reason: "안전/보호/감지 계열 부품은 무조건 고위험"

  - id: HR-004
    condition: "fourm_type == M5_design"
    reason: "설계 변경은 전수 검증 대상 — 예외 없음"

  - id: HR-005
    condition: "fourm_type in [M1_material, M6_supplier] AND functional_change == UNKNOWN"
    reason: "부품/공급사 변경에서 기능 영향 미확인 = 잠재 고위험"

  - id: HR-006
    condition: "phase == PRE_MP"
    reason: "양산 전(PRE_MP) 단계 — 모든 변경은 개발 검증 우선 (설계 확정 전)"

  - id: HR-007
    condition: "phase == MP AND product_type == EXISTING AND fourm_type == M5_design"
    reason: "양산 중 기존 제품 설계 변경 — 최고 위험 구간, 자동 ALLOW 금지"

  - id: HR-008
    condition: "phase == MP AND product_type == NEW"
    reason: "신규 제품 양산 초기 — 개발 책임 유지, 변경 제한"

  - id: HR-009
    condition: "fourm_type == M1_material AND pin_map_changed != NO"
    reason: >
      M1 대체품 적용 시 핀맵 확인이 NO로 명시되지 않으면 REDIRECT_DEV.
      근거: INC-001 (Rohm IC 핀맵 불일치, 손실 2천만원, 2026-04-22).
      핀맵 검증은 개발 고유 업무 — 구매/품질 서명으로 대체 불가.
    gate_action: REDIRECT_DEV
    enforced_from: "2026-04-22"
